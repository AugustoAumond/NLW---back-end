app = "nlw-back-end"
primary_region = "gru"

[build]

[env]
  PORT = "3000"

[[mounts]]
  source = "data"
  destination = "/data"

[processes]
  app = "npm start"

[http_service]
  internal_port = 3000
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 1

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1